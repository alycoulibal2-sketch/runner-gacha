<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Runner Gacha — Logo Export</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: Inter, system-ui, sans-serif; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 48px; }
  h3 { color: #666; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }

<!-- ═══════════════════════════════════════════ -->
<!--  1 × 1  SQUARE  (1080 × 1080)              -->
<!--  Instagram / Twitter profile / App icon     -->
<!-- ═══════════════════════════════════════════ -->
<div>

      <radialGradient id="bg" cx="50%" cy="30%" r="70%">

        <stop offset="100%" stop-color="#050c1a"/>

        <stop offset="50%"  stop-color="#ffb86b"/>
        <stop offset="100%" stop-color="#7c4dff"/>

        <stop offset="0%" stop-color="#fde68a"/>
        <stop offset="100%" stop-color="#f59e0b"/>

      <filter id="glow">
        <feGaussianBlur stdDeviation="8" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="softglow">
        <feGaussianBlur stdDeviation="18" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>

    <!-- Background -->
    <rect width="1080" height="1080" fill="url(#bg)"/>

    <!-- Stars -->

      <circle cx="350" cy="120" r="1" fill="#fff"/><circle cx="500" cy="70"  r="2" fill="#fff"/>
      <circle cx="650" cy="40"  r="1.5" fill="#fff"/><circle cx="780" cy="100" r="1" fill="#fff"/>
      <circle cx="920" cy="60"  r="2" fill="#fff"/><circle cx="1000" cy="150" r="1.5" fill="#fff"/>
      <circle cx="130" cy="200" r="1" fill="#fff"/><circle cx="960"  cy="200" r="2" fill="#fff"/>
      <circle cx="440" cy="160" r="1.5" fill="#fff"/><circle cx="710" cy="180" r="1" fill="#fff"/>
      <circle cx="30"  cy="320" r="1.5" fill="#fff"/><circle cx="1050" cy="300" r="1" fill="#fff"/>
    </g>

    <!-- Glow behind title -->
    <ellipse cx="540" cy="400" rx="380" ry="120" fill="#7c4dff" opacity="0.08"/>
    <ellipse cx="540" cy="400" rx="260" ry="80"  fill="#ff7a59" opacity="0.07"/>

    <!-- ── Game scene ── -->
    <!-- Ground -->
    <rect x="60" y="760" width="960" height="3" fill="rgba(255,255,255,0.08)" rx="2"/>
    <rect x="60" y="763" width="960" height="160" fill="rgba(15,23,42,0.5)" rx="0"/>

    <!-- Obstacle -->
    <rect x="680" y="660" width="90" height="103" rx="8" fill="#f43f5e" opacity="0.9"/>
    <rect x="680" y="660" width="90" height="103" rx="8" fill="none" stroke="rgba(255,100,120,0.4)" stroke-width="2"/>

    <rect x="685" y="665" width="18" height="93" rx="4" fill="rgba(255,255,255,0.08)"/>

    <!-- Coin -->
    <circle cx="820" cy="700" r="28" fill="url(#coinGrad)" filter="url(#glow)"/>
    <circle cx="820" cy="700" r="20" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
    <text x="820" y="708" text-anchor="middle" font-size="22" font-weight="900" fill="#92400e">$</text>

    <!-- Runner (jumping block) -->
    <g transform="translate(520, 580)">

      <ellipse cx="54" cy="188" rx="42" ry="10" fill="rgba(0,0,0,0.3)"/>
      <!-- body -->
      <rect x="10" y="10" width="88" height="88" rx="14" fill="#38bdf8"/>
      <!-- face shine -->
      <rect x="16" y="16" width="32" height="28" rx="6" fill="rgba(255,255,255,0.18)"/>
      <!-- outline -->
      <rect x="10" y="10" width="88" height="88" rx="14" fill="none" stroke="rgba(56,189,248,0.5)" stroke-width="3"/>
      <!-- motion trail -->
      <rect x="-30" y="30" width="36" height="14" rx="7" fill="rgba(56,189,248,0.25)"/>
      <rect x="-55" y="48" width="22" height="10" rx="5" fill="rgba(56,189,248,0.15)"/>
    </g>

    <!-- Coin sparkles -->
    <g fill="#fde68a" opacity="0.8">

    <!-- ── Title ── -->
    <text x="540" y="310" text-anchor="middle"
          font-family="Inter,system-ui,sans-serif"
          font-size="148" font-weight="900" letter-spacing="-4"
          fill="url(#titleGrad)" filter="url(#softglow)">RUNNER</text>

    <text x="540" y="460" text-anchor="middle"
          font-family="Inter,system-ui,sans-serif"
          font-size="148" font-weight="900" letter-spacing="-4"
          fill="url(#titleGrad)" opacity="0.92">GACHA</text>

    <!-- Tagline -->
    <text x="540" y="520" text-anchor="middle"
          font-family="Inter,system-ui,sans-serif"
          font-size="36" font-weight="600" letter-spacing="6"
          fill="rgba(255,255,255,0.38)">JUMP · COLLECT · UNLOCK</text>

    <rect x="390" y="890" width="300" height="52" rx="26" fill="rgba(124,77,255,0.18)" stroke="rgba(124,77,255,0.35)" stroke-width="1.5"/>
    <text x="540" y="922" text-anchor="middle"

          font-size="28" font-weight="800" letter-spacing="2"
          fill="rgba(255,255,255,0.65)">runnergacha.com</text>

  <p class="label">Screenshot at 2× for 1080×1080px</p>
